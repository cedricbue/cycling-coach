<table mat-table [dataSource]="rows()" class="zones-table">
  <ng-container matColumnDef="zone">
    <th mat-header-cell *matHeaderCellDef>Zone</th>
    <td mat-cell *matCellDef="let row">
      <span class="zone-badge" [class]="'z' + row.zone.toLowerCase()">{{ row.zone }}</span>
    </td>
  </ng-container>

  <ng-container matColumnDef="name">
    <th mat-header-cell *matHeaderCellDef>Name</th>
    <td mat-cell *matCellDef="let row">{{ row.name }}</td>
  </ng-container>

  <ng-container matColumnDef="pctRange">
    <th mat-header-cell *matHeaderCellDef>% Max HR</th>
    <td mat-cell *matCellDef="let row">
      {{ row.minPct }}–{{ row.maxPct ?? '∞' }}%
    </td>
  </ng-container>

  <ng-container matColumnDef="bpmRange">
    <th mat-header-cell *matHeaderCellDef>BPM</th>
    <td mat-cell *matCellDef="let row">
      @if (row.minBpm !== null) {
        {{ row.minBpm }}–{{ row.maxBpm != null ? row.maxBpm : '∞' }} bpm
      } @else {
        —
      }
    </td>
  </ng-container>

  <ng-container matColumnDef="description">
    <th mat-header-cell *matHeaderCellDef>Training purpose</th>
    <td mat-cell *matCellDef="let row" class="description-cell">{{ row.description }}</td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
</table>
