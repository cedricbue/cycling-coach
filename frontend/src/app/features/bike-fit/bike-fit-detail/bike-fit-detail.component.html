<div class="cc-page bike-fit-detail">
  <div class="page-header">
    <button mat-icon-button (click)="goBack()">
      <mat-icon>arrow_back</mat-icon>
    </button>
    <h1 class="mat-headline-medium">Bike Fit Analysis</h1>
    @if (loading()) { <mat-spinner diameter="24" /> }
  </div>

  @if (error()) { <div class="error-msg">{{ error() }}</div> }

  @if (detail(); as d) {
    <div class="detail-layout">
      <div class="video-column">
        <app-video-landmarks-player
          [videoSrc]="videoUrl"
          [landmarksJson]="d.landmarksJson ?? null"
          [visibleAngleNames]="selectedAngleNames()"
          (anglesChanged)="onAnglesChanged($event)"
        />
      </div>

      <div class="angles-column cc-card">
        <div class="angles-header">
          <mat-checkbox
            [checked]="allSelected()"
            [indeterminate]="someSelected()"
            (change)="toggleAll(!!$event.checked)"
            color="primary">
            Bike Fit Angles
          </mat-checkbox>
          <div class="profile-toggle">
            <button class="profile-btn" [class.active]="riderProfile() === 'endurance'"
                    (click)="riderProfile.set('endurance')">Endurance</button>
            <button class="profile-btn" [class.active]="riderProfile() === 'race'"
                    (click)="riderProfile.set('race')">Race</button>
          </div>
        </div>
        <span class="accuracy-note">±3–5° knee, ±5–8° torso/hip</span>

        <app-angle-display
          [angles]="angles()"
          [selectedNames]="selectedAngleNames()"
          [riderProfile]="riderProfile()"
          (nameToggled)="onAngleToggled($event)"
        />
      </div>
    </div>
  }
</div>
