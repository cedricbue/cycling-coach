<div class="player-wrapper">
  <div class="video-container" [class.measure-mode]="measureMode()">
    <video
      #videoEl
      [src]="videoSrc()"
      controls
      playsinline
      class="video"
    ></video>
    <canvas
      #canvasEl
      class="overlay"
    ></canvas>
  </div>

  <!-- Left toolbar: measure controls -->
  <div class="player-toolbar toolbar-left">
    <button mat-stroked-button
      class="toolbar-btn"
      [class.active]="measureMode()"
      (click)="toggleMeasure()">
      <mat-icon>straighten</mat-icon>
      {{ measureMode() ? 'Measuring' : 'Measure' }}
    </button>
    @if (measureMode()) {
      <button mat-icon-button class="toolbar-icon-btn" (click)="addMeasurement()" matTooltip="Add measurement">
        <mat-icon>add</mat-icon>
      </button>
    }
    @if (hasMeasurements()) {
      <button mat-icon-button class="toolbar-icon-btn" (click)="clearMeasurements()" matTooltip="Clear all">
        <mat-icon>clear</mat-icon>
      </button>
    }
    @if (measureMode()) {
      <span class="measure-hint"><kbd>Shift</kbd> free · <kbd>Alt</kbd> H/V</span>
    }
  </div>

  <!-- Right toolbar: playback speed + keyboard hints -->
  <div class="player-toolbar toolbar-right">
    <span class="toolbar-hint">
      <kbd>Space</kbd> play · <kbd>←</kbd><kbd>→</kbd> frame
    </span>
    @for (s of speeds; track s.rate) {
      <button class="speed-btn" [class.active]="playbackRate() === s.rate" (click)="setSpeed(s.rate)">
        {{ s.label }}
      </button>
    }
  </div>
</div>
