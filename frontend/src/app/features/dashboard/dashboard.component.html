<div class="cc-page dashboard">
  @if (loading()) {
    <div class="loading-overlay">
      <mat-spinner diameter="48" />
    </div>
  }

  <!-- Daily AI Recommendation -->
  <div class="recommendation-section">
    <app-recommendation-card
      [recommendation]="recommendation()"
      [loading]="recommendationLoading()"
      [error]="recommendationError()"
      (regenerate)="onRegenerate()"
    />
  </div>

  <!-- Metric cards row -->
  <div class="metrics-row">
    <app-metric-card
      label="CTL — Fitness"
      [value]="latestPmc()?.ctl | number:'1.0-0'"
      subtitle="Chronic Training Load (42d)"
      accent="blue"
      description="A 42-day rolling average of your daily Training Stress Score. Think of it as your aerobic fitness bank — built slowly over weeks and months of consistent work. Higher CTL means more fitness, but it takes time to build and just as long to lose."
    />
    <app-metric-card
      label="ATL — Fatigue"
      [value]="latestPmc()?.atl | number:'1.0-0'"
      subtitle="Acute Training Load (7d)"
      accent="orange"
      description="A 7-day rolling average of your TSS. Reflects how tired your body is from recent training. It spikes quickly when you train hard and drops fast during rest. High ATL means accumulated fatigue — your body is adapting."
    />
    <app-metric-card
      label="TSB — Form"
      [value]="latestPmc()?.tsb | number:'1.0-0'"
      [subtitle]="tsbSubtitle"
      [accent]="tsbAccent"
      description="Yesterday's CTL minus yesterday's ATL. Negative TSB means you're carrying fatigue (building fitness). Near zero is balanced. A TSB of +5 to +15 is the sweet spot for racing — fresh enough to perform, fit enough to be fast."
    />
    <app-metric-card
      label="FTP"
      [value]="currentFtp()"
      unit="W"
      [secondaryValue]="ftpPerKg() | number:'1.2-2'"
      secondaryUnit="W/kg"
      subtitle="Functional Threshold Power"
      accent="neutral"
      description="The highest average power you can sustain for ~60 minutes. The cornerstone of power-based training — used to set your zones and calculate TSS and IF. Auto-detected from your best 20-minute power × 0.95. W/kg is your power-to-weight ratio — the key metric for climbing. Elite climbers exceed 5.5 W/kg; competitive amateurs typically target 3.5–4.5 W/kg."
    />
  </div>

  <!-- PMC Chart -->
  <div class="chart-section">
    <app-pmc-chart [data]="pmcData()" />
  </div>

  <!-- Recent Rides -->
  <div class="rides-section">
    <app-recent-rides [rides]="recentRides()" />
  </div>
</div>
