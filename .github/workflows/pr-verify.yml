name: PR Verify

on:
  pull_request:
    branches: ["**"]

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: "25"
          distribution: "temurin"
          cache: maven

      - name: Create data directory for SQLite
        run: mkdir -p data

      - name: Run mvn verify
        run: ./mvnw verify
