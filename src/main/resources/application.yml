server:
  port: 8080

spring:
  web:
    resources:
      static-locations: classpath:/static/browser/
  datasource:
    url: jdbc:sqlite:./data/cycling-coach.db
    driver-class-name: org.sqlite.JDBC
    hikari:
      maximum-pool-size: 1
      connection-init-sql: "PRAGMA journal_mode=WAL; PRAGMA foreign_keys=ON;"
  jooq:
    sql-dialect: SQLITE
  flyway:
    enabled: true
    locations: classpath:db/migration
  main:
    banner-mode: off

garmin:
  email: ${GARMIN_EMAIL:}
  password: ${GARMIN_PASSWORD:}


logging:
  level:
    com.cyclingcoach.sync: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
