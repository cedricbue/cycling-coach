server:
  port: 8080
  tomcat:
    max-http-form-post-size: -1

spring:
  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 502MB
      file-size-threshold: 1MB
  mvc:
    async:
      request-timeout: -1
  web:
    resources:
      static-locations: classpath:/static/browser/
  datasource:
    url: jdbc:sqlite:./data/cycling-coach.db
    driver-class-name: org.sqlite.JDBC
    hikari:
      maximum-pool-size: 1
      connection-init-sql: "PRAGMA journal_mode=WAL; PRAGMA foreign_keys=ON;"
  jooq:
    sql-dialect: SQLITE
  flyway:
    enabled: true
    locations: classpath:db/migration
  main:
    banner-mode: off
  ai:
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      chat:
        model: ${AI_MODEL:gemma4:latest}

bike-fit:
  data-dir: ${BIKE_FIT_DATA_DIR:./data/bike-fit}
  landmarks-api-url: ${LANDMARKS_API_URL:http://0.0.0.0:8002}
  landmarks-read-timeout-minutes: ${LANDMARKS_READ_TIMEOUT_MINUTES:60}
  landmarks-write-timeout-minutes: ${LANDMARKS_WRITE_TIMEOUT_MINUTES:10}

coaching:
  location:
    lat: ${COACHING_LAT:}
    lon: ${COACHING_LON:}

garmin:
  email: ${GARMIN_EMAIL:}
  password: ${GARMIN_PASSWORD:}


logging:
  level:
    com.cyclingcoach.sync: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
